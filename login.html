<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      border-radius: 15px;
      padding: 25px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .login-card:hover {
      transform: translateY(-5px);
    }

    .logo {
      width: 90px;
      display: block;
      margin: 0 auto 15px auto;
    }

    h2 {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .form-control {
      border-radius: 10px;
      padding: 10px;
    }

    .btn-success {
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="login-card">

  <img src="logo.png" class="logo" alt="School Logo">

  <h2>Student Login</h2>

  <input id="loginMatric" class="form-control mb-3" type="text" placeholder="Matric Number">

  <input id="loginPassword" class="form-control mb-3" type="password" placeholder="Password">

  <button class="btn btn-success w-100" onclick="loginStudent()"> 
    Login 
  </button>

  <div class="text-center mt-3">
    <a href="registration.html">Create New Account</a>
  </div>

</div>

<script>
function loginStudent() {

  var matric = document.getElementById("loginMatric").value;
  var password = document.getElementById("loginPassword").value;

  var savedMatric = localStorage.getItem("studentMatric");
  var savedPassword = localStorage.getItem("studentPassword");

  if (matric === savedMatric && password === savedPassword) {
    alert("Login Successful");
    window.location.href = "dashboard.html";
  } else {
    alert("Invalid Matric Number or Password");
  }
}
</script>

</body>
</html>
