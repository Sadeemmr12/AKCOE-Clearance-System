<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<script>

if(sessionStorage.getItem("adminAccess") !== "granted"){

window.location.href = "admin-login.html";

}

</script>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="index.html">
AKCOE Clearance System
</a>

</div>

</nav>

<div class="container mt-4">

<h1 class="text-center">
AKCOE Admin Dashboard
</h1>

<h3 class="mt-4">
Student Clearance Requests
</h3>

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>Name</th>
<th>Matric No</th>
<th>Department</th>
<th>Level</th>
<th>Receipt</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

<a href="status.html" class="btn btn-primary">
View Student Status
</a>

<button
class="btn btn-danger"
onclick="adminLogout()">

Logout

</button>

<hr>

<p class="text-center">
© 2026 Aminu Kano College of Education Student Clearance System
</p>

</div>

<script>

var students =
JSON.parse(localStorage.getItem("students")) || [];

var table =
document.getElementById("studentTable");

if(students.length === 0){

table.innerHTML =

"<tr><td colspan='7' class='text-center'>No Student Application Found</td></tr>";

}
else{

students.forEach(function(student,index){

table.innerHTML +=

"<tr>" +

"<td>" + student.name + "</td>" +

"<td>" + student.matric + "</td>" +

"<td>" + student.dept + "</td>" +

"<td>" + student.level + "</td>" +

"<td><img src='" + student.receiptImage + "' width='120'></td>" +

"<td>" + student.status + "</td>" +

"<td>" +

"<button class='btn btn-success btn-sm me-1' onclick='approveStudent(" + index + ")'>Approve</button>" +

"<button class='btn btn-danger btn-sm' onclick='rejectStudent(" + index + ")'>Reject</button>" +

"</td>" +

"</tr>";
});

}

function approveStudent(index){

var students =
JSON.parse(localStorage.getItem("students")) || [];

students[index].status = "Approved";

localStorage.setItem(
"students",
JSON.stringify(students)
);

alert("Student Approved Successfully");

location.reload();

}

function rejectStudent(index){

var students =
JSON.parse(localStorage.getItem("students")) || [];

students[index].status = "Rejected";

localStorage.setItem(
"students",
JSON.stringify(students)
);

alert("Student Rejected");

location.reload();

}

</script>

<script src="script.js"></script>

</body>
</html>
