<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Clearance Status</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="index.html">
AKCOE Clearance System
</a>
</div>
</nav>
<h2>Clearance Status</h2>

<p id="studentInfo"></p>

<table border="1" width="80%" align="center">

<tr>
<th>Unit</th>
<th>Status</th>
</tr>

<tr>
<td>Department</td>
<td id="deptStatus">Pending</td>
</tr>

<tr>
<td>Library</td>
<td>Pending</td>
</tr>

<tr>
<td>Bursary</td>
<td>Pending</td>
</tr>

<tr>
<td>Final Clearance</td>
<td id="finalStatus">Pending</td>
</tr>

</table>

<br>

<a href="certificate.html">
<button>Print Certificate</button>
</a>

<hr>

<p>
© 2026 Aminu Kano College of Education Student Clearance System
</p>

<script>

var name = localStorage.getItem("studentName");
var matric = localStorage.getItem("studentMatric");
var dept = localStorage.getItem("studentDept");
var status = localStorage.getItem("clearanceStatus");

document.getElementById("studentInfo").innerHTML =
"<b>Name:</b> " + name +
"<br><b>Matric No:</b> " + matric +
"<br><b>Department:</b> " + dept +
"<br><b>Status:</b> " + status;

document.getElementById("deptStatus").innerHTML = status;

if(status === "Approved"){
document.getElementById("finalStatus").innerHTML = "CLEARED";
}

</script>

<script src="script.js"></script>

</body>
</html>
