<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0d6efd,#0dcaf0);
    min-height:100vh;
}

.register-card{
    max-width:550px;
    margin:auto;
    margin-top:40px;
    border:none;
    border-radius:20px;
}

.logo{
    width:100px;
}

.form-control{
    border-radius:10px;
    padding:12px;
}

.btn-register{
    border-radius:10px;
    padding:12px;
    font-weight:bold;
}

.footer{
    text-align:center;
    color:white;
    margin-top:20px;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            AKCOE Clearance System
        </a>
    </div>
</nav>

<div class="container">

    <div class="card register-card shadow-lg">

        <div class="card-body p-4">

            <div class="text-center mb-4">
                <img src="logo.png" class="logo mb-3" alt="AKCOE Logo">

                <h2 class="fw-bold">
                    Student Registration
                </h2>

                <p class="text-muted">
                    Create your student account
                </p>
            </div>

            <div class="mb-3">
                <input id="fullname"
                class="form-control"
                type="text"
                placeholder="Full Name">
            </div>

            <div class="mb-3">
                <input id="matric"
                class="form-control"
                type="text"
                placeholder="Matric Number">
            </div>

            <div class="mb-3">
                <input id="department"
                class="form-control"
                type="text"
                placeholder="Department">
            </div>

            <div class="mb-3">
                <select id="level" class="form-control">
                    <option value="">Select Level</option>
                    <option>NCE I</option>
                    <option>NCE II</option>
                    <option>NCE III</option>
                </select>
            </div>

            <div class="mb-3">
                <input id="email"
                class="form-control"
                type="email"
                placeholder="Email Address">
            </div>

            <div class="mb-3">
                <input id="password"
                class="form-control"
                type="password"
                placeholder="Password">
            </div>

            <button
            class="btn btn-primary btn-register w-100"
            onclick="registerStudent()">
                Register
            </button>

            <div class="text-center mt-3">
                <a href="login.html" class="text-decoration-none">
                    Already have an account? Login
                </a>
            </div>

        </div>

    </div>

</div>

<div class="footer">
    <p>
        © 2026 Aminu Kano College of Education
    </p>
</div>

<script src="script.js"></script>

</body>
</html>
