<!DOCTYPE html>
<html>
<head>
<title>Clearance Application</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">
<div class="container">

<a class="navbar-brand" href="index.html">
AKCOE Clearance System
</a>

</div>
</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center">
Student Clearance Form
</h2>

<form>

<input
id="name"
class="form-control"
type="text"
placeholder="Full Name"
required>

<br>

<input
id="matric"
class="form-control"
type="text"
placeholder="Matric Number"
required>

<br>

<input
id="dept"
class="form-control"
type="text"
placeholder="Department"
required>

<br>

<input
id="email"
class="form-control"
type="email"
placeholder="Email Address"
required>

<br>

<label><b>Select Level</b></label>

<select
id="level"
class="form-control"
required>

<option value="">
-- Select Level --
</option>

<option value="NCE I">
NCE I
</option>

<option value="NCE II">
NCE II
</option>

<option value="NCE III">
NCE III
</option>

</select>

<br>

<label><b>Upload Payment Receipt</b></label>

<input
id="receipt"
class="form-control"
type="file"
accept="image/*"
required>

<br>

<button
type="button"
class="btn btn-primary w-100"
onclick="submitForm()">

Submit Clearance

</button>

</form>

</div>

</div>

<hr>

<p class="text-center">
© 2026 Aminu Kano College of Education Student Clearance System
</p>

</div>

<script src="script.js"></script>

</body>
</html>
