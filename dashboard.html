<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f4f7fc;
}

.navbar-brand{
    font-weight:bold;
}

.logo{
    width:120px;
    display:block;
    margin:auto;
}

.welcome-card{
    background:linear-gradient(135deg,#0d6efd,#0dcaf0);
    color:white;
    border-radius:15px;
}

.action-card{
    border:none;
    border-radius:15px;
    transition:.3s;
}

.action-card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:50px;
}

.footer{
    text-align:center;
    color:gray;
    margin-top:30px;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand" href="#">
            AKCOE Clearance System
        </a>
    </div>
</nav>

<div class="container py-4">

    <!-- Logo -->
    <img src="logo.png" class="logo mb-3" alt="Logo">

    <!-- Welcome Card -->
    <div class="card welcome-card shadow mb-4">
        <div class="card-body text-center">
            <h2>Student Dashboard</h2>
            <p id="welcome" class="fs-5 mb-0"></p>
        </div>
    </div>

    <!-- Dashboard Options -->
    <div class="row g-4">

        <div class="col-md-4">
            <a href="clearance.html" class="text-decoration-none">
                <div class="card action-card shadow text-center p-4">
                    <i class="bi bi-file-earmark-check icon text-primary"></i>
                    <h5 class="mt-3">Apply for Clearance</h5>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="status.html" class="text-decoration-none">
                <div class="card action-card shadow text-center p-4">
                    <i class="bi bi-search icon text-success"></i>
                    <h5 class="mt-3">Check Status</h5>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="certificate.html" class="text-decoration-none">
                <div class="card action-card shadow text-center p-4">
                    <i class="bi bi-printer icon text-danger"></i>
                    <h5 class="mt-3">Print Certificate</h5>
                </div>
            </a>
        </div>

    </div>

    <div class="footer">
        © 2026 AKCOE Online Clearance System
    </div>

</div>

<script>
document.getElementById("welcome").innerHTML =
"Welcome, " +
(localStorage.getItem("studentName") || "S");
</script>

<script>
document.getElementById("welcome").innerHTML =
"Welcome, " +
(localStorage.getItem("matrixNumber") || "Student");
</script>
</body>
</html>
