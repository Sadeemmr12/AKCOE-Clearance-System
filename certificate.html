<!DOCTYPE html>
<html>
<head>
<title>Student Clearance Certificate</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.certificate{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border:5px solid #003366;
border-radius:10px;
}

.logo{
width:120px;
}

.title{
color:#003366;
font-weight:bold;
}

.status{
color:green;
font-weight:bold;
font-size:28px;
}

.signature{
margin-top:60px;
display:flex;
justify-content:space-between;
}

.line{
border-top:1px solid black;
width:250px;
padding-top:5px;
text-align:center;
}

</style>

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="certificate text-center shadow">

<img src="logo.png" class="logo">

<h1 class="title">
AMINU KANO COLLEGE OF EDUCATION
</h1>

<h4>KANO STATE, NIGERIA</h4>

<hr>

<h2 class="title">
STUDENT CLEARANCE CERTIFICATE
</h2>

<br>

<p id="studentName"></p>

<p id="studentMatric"></p>

<p id="studentDept"></p>

<p id="studentLevel"></p>

<br>

<h3 id="studentStatus" class="status"></h3>

<br>

<p>
This is to certify that the above named student has successfully completed all required clearance procedures and is hereby cleared by the institution.
</p>

<br>

<p id="clearanceDate"></p>

<div class="signature">

<div>
<div class="line">
Registrar
</div>
</div>

<div>
<div class="line">
Official Stamp
</div>
</div>

</div>

<br><br>

<button class="btn btn-primary" onclick="window.print()">
Print Certificate
</button>

</div>

</div>

<script>

document.getElementById("studentName").innerHTML =
"<strong>Name:</strong> " +
(localStorage.getItem("studentName") || "N/A");

document.getElementById("studentMatric").innerHTML =
"<strong>Matric Number:</strong> " +
(localStorage.getItem("studentMatric") || "N/A");

document.getElementById("studentDept").innerHTML =
"<strong>Department:</strong> " +
(localStorage.getItem("studentDept") || "N/A");

document.getElementById("studentLevel").innerHTML =
"<strong>Level:</strong> " +
(localStorage.getItem("studentLevel") || "N/A");

var status =
localStorage.getItem("clearanceStatus");

if(status === "Approved"){
document.getElementById("studentStatus").innerHTML =
"STATUS: CLEARED";
}
else{
document.getElementById("studentStatus").innerHTML =
"STATUS: PENDING";
}

var today = new Date();

document.getElementById("clearanceDate").innerHTML =
"<strong>Date of Clearance:</strong> " +
today.toDateString();

</script>

</body>
</html>
